<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>NattDev AI Website Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000, #4b0082, #007bff);
      color: white;
    }

    .container {
      max-width: 400px;
      margin: auto;
      margin-top: 80px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    .nav {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "[]");
let session = JSON.parse(localStorage.getItem("session") || "null");

let currentOTP = "";
let currentEmail = "";

function saveUsers() {
  localStorage.setItem("users", JSON.stringify(users));
}

function saveSession(user) {
  localStorage.setItem("session", JSON.stringify(user));
}

function logout() {
  localStorage.removeItem("session");
  location.reload();
}

function sendOTP(email) {
  currentOTP = Math.floor(100000 + Math.random()*900000).toString();
  currentEmail = email;
  alert("OTP: " + currentOTP); // DEMO
}

function renderLogin() {
  app.innerHTML = `
    <div class="container">
      <h2>NattDev AI</h2>
      <input id="email" placeholder="Email">
      <button onclick="handleSendOTP()">ส่ง OTP</button>
      <input id="otp" placeholder="OTP">
      <button onclick="handleLogin()">เข้าสู่ระบบ</button>
    </div>
  `;
}

function handleSendOTP() {
  const email = document.getElementById("email").value;
  sendOTP(email);
}

function handleLogin() {
  const otp = document.getElementById("otp").value;

  if (otp !== currentOTP) {
    alert("OTP ผิด");
    return;
  }

  let user = users.find(u => u.email === currentEmail);

  if (!user) {
    user = {
      email: currentEmail,
      role: currentEmail === "nattdev@admin.com" ? "ADMIN" : "USER",
      status: "Free",
      usage: 0,
      history: []
    };
    users.push(user);
    saveUsers();
  }

  saveSession(user);
  renderDashboard();
}

function renderDashboard() {
  const user = JSON.parse(localStorage.getItem("session"));

  app.innerHTML = `
    <div class="container">
      <h2>Dashboard</h2>
      <p>${user.email}</p>
      <p>${user.role}</p>
      <p>${user.status}</p>
      <p>Usage: ${user.usage}</p>

      <div class="nav">
        <button onclick="renderBuilder()">Builder</button>
        <button onclick="renderHistory()">History</button>
        <button onclick="upgrade()">Upgrade</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  `;
}

function renderBuilder() {
  app.innerHTML = `
    <div class="container">
      <h2>AI Builder</h2>
      <input id="prompt" placeholder="สร้างเว็บเกี่ยวกับ...">
      <button onclick="generate()">Generate</button>
      <textarea id="result"></textarea>
      <button onclick="renderDashboard()">Back</button>
    </div>
  `;
}

function generate() {
  let user = JSON.parse(localStorage.getItem("session"));

  if (user.status === "Free" && user.usage >= 3) {
    alert("ใช้ฟรีครบแล้ว!");
    return;
  }

  const prompt = document.getElementById("prompt").value;

  const html = `
  <html>
  <body>
    <h1>${prompt}</h1>
    <p>Generated by NattDev AI</p>
  </body>
  </html>`;

  document.getElementById("result").value = html;

  user.usage++;
  user.history.push(prompt);

  localStorage.setItem("session", JSON.stringify(user));

  users = users.map(u => u.email === user.email ? user : u);
  saveUsers();
}

function renderHistory() {
  let user = JSON.parse(localStorage.getItem("session"));

  let list = user.history.map(h => `<li>${h}</li>`).join("");

  app.innerHTML = `
    <div class="container">
      <h2>History</h2>
      <ul>${list}</ul>
      <button onclick="renderDashboard()">Back</button>
    </div>
  `;
}

function upgrade() {
  let user = JSON.parse(localStorage.getItem("session"));
  user.status = "Pro";
  localStorage.setItem("session", JSON.stringify(user));

  users = users.map(u => u.email === user.email ? user : u);
  saveUsers();

  alert("อัปเกรดสำเร็จ (Demo)");
  renderDashboard();
}

if (session) {
  renderDashboard();
} else {
  renderLogin();
}
</script>

</body>
</html>
